<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreamNXT Cast Receiver</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a14;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    /* Idle screen — shown when connected but no media playing */
    #splash {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #0a0614, #0a0a14);
      z-index: 10;
      transition: opacity 0.5s ease;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }

    #splash .logo {
      width: 200px;
      height: 80px;
      object-fit: contain;
      margin-bottom: 24px;
    }
    /* App-launch splash video (branded). Hidden + replaced by the text logo
       if it fails to load. */
    #splash .splash-video {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    #splash.no-video .splash-video { display: none; }
    /* When the branded video plays it IS the splash — hide the text logo,
       tagline and ready hint. They only show as the no-video fallback. */
    #splash:not(.no-video) .logo-text,
    #splash:not(.no-video) .tagline,
    #splash:not(.no-video) .ready-text { display: none; }
    #splash .logo-text {
      font-size: 48px;
      font-weight: 800;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #e63946, #ff8c42);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 16px;
    }
    #splash .tagline {
      font-size: 18px;
      color: rgba(255,255,255,0.5);
      font-weight: 400;
    }
    #splash .ready-text {
      margin-top: 40px;
      font-size: 14px;
      color: rgba(255,255,255,0.3);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.7; }
    }

    /* Player */
    #player {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 5;
    }
    cast-media-player {
      width: 100%;
      height: 100%;
      --background-color: #0a0a14;
      --advancement-color: #e63946;
      --advancement-disabled-color: rgba(255,255,255,0.2);
      --splash-image: none;
      --splash-size: contain;
      --spinner-color: #e63946;
      --playback-logo-image: none;
      --watermark-color: rgba(255,255,255,0.15);
    }

    /* Forensic fingerprint watermark — above the video, never blocks input.
       Sits below the transient branding overlay so the title stays readable. */
    #wm-layer {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 15;
      pointer-events: none;
      overflow: hidden;
    }
    .wm {
      position: absolute;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-weight: 600;
      letter-spacing: 0.5px;
      white-space: nowrap;
      color: #ffffff;
      text-shadow: 0 1px 2px rgba(0,0,0,0.55);
      transition: top 0.6s ease, left 0.6s ease, right 0.6s ease, bottom 0.6s ease;
    }
    #wm-tiled {
      position: absolute;
      top: -10%; left: -10%; right: -10%; bottom: -10%;
      z-index: 15;
      pointer-events: none;
      display: none;
      transform: rotate(-24deg);
      flex-wrap: wrap;
      align-content: space-around;
      justify-content: space-around;
    }
    #wm-tiled .wm-cell {
      width: 32%;
      text-align: center;
      font-weight: 500;
      white-space: nowrap;
      color: #ffffff;
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    }

    /* Overlay branding on top of player */
    #overlay {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 24px 32px;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 100%);
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }
    #overlay.visible { opacity: 1; }

    #overlay .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    #overlay .brand-logo {
      height: 32px;
      object-fit: contain;
    }
    #overlay .brand-name {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 1px;
    }
    #overlay .now-playing {
      text-align: right;
    }
    #overlay .now-playing .title {
      font-size: 18px;
      font-weight: 600;
    }
    #overlay .now-playing .subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      margin-top: 4px;
    }
  </style>
</head>
<body>

  <!-- Idle/Splash Screen — branded app-launch splash video, with the text
       logo as a fallback when the video can't load. -->
  <div id="splash">
    <video class="splash-video" id="splashVideo" autoplay loop muted playsinline
      src="https://fsn1.your-objectstorage.com/str-bucket/splash/videos/1781805104801-cbdpfs.mp4"></video>
    <div class="logo-text" id="platformName">StreamNxt+</div>
    <div class="tagline" id="tagline">Your Entertainment, Your Way</div>
    <div class="ready-text">Ready to cast</div>
  </div>

  <!-- Cast Media Player (Google's built-in player component) -->
  <div id="player">
    <cast-media-player></cast-media-player>
  </div>

  <!-- Forensic fingerprint watermark (single roaming/fixed + tiled grid) -->
  <div id="wm-layer"><div id="wm" class="wm"></div></div>
  <div id="wm-tiled"></div>

  <!-- Top overlay with branding + now playing info -->
  <div id="overlay">
    <div class="brand">
      <span class="brand-name" id="overlayBrand">StreamNxt+</span>
    </div>
    <div class="now-playing">
      <div class="title" id="mediaTitle"></div>
      <div class="subtitle" id="mediaSubtitle"></div>
    </div>
  </div>

  <!-- Google Cast CAF Receiver SDK -->
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>

  <script>
    const context = cast.framework.CastReceiverContext.getInstance();
    const playerManager = context.getPlayerManager();

    // Splash video fallback — if the branded app-launch video can't load, fall
    // back to the text logo + tagline.
    (function () {
      const sp = document.getElementById('splash');
      const sv = document.getElementById('splashVideo');
      if (!sp || !sv) return;
      sv.addEventListener('error', () => sp.classList.add('no-video'));
      // Some receivers block autoplay until interaction — nudge it.
      const p = sv.play && sv.play();
      if (p && p.catch) p.catch(() => {});
    })();

    // ── Configuration ──
    const options = new cast.framework.CastReceiverOptions();
    options.disableIdleTimeout = false;
    options.maxInactivity = 300; // 5 min idle timeout
    options.supportedCommands =
      cast.framework.messages.Command.ALL_BASIC_MEDIA |
      cast.framework.messages.Command.STREAM_VOLUME |
      cast.framework.messages.Command.STREAM_MUTE;

    // ── Splash / Player visibility ──
    const splash = document.getElementById('splash');
    const overlay = document.getElementById('overlay');
    const mediaTitle = document.getElementById('mediaTitle');
    const mediaSubtitle = document.getElementById('mediaSubtitle');

    let overlayTimer = null;

    function showOverlay() {
      overlay.classList.add('visible');
      clearTimeout(overlayTimer);
      overlayTimer = setTimeout(() => overlay.classList.remove('visible'), 5000);
    }

    // ── Forensic watermark ──────────────────────────────────────────────────
    // The sender (web / mobile) resolves the per-user fingerprint + style from
    // the tenant's visibleWatermark config and ships it in media.customData.
    // The receiver only renders it, so the fingerprint logic stays in one place.
    const wmEl    = document.getElementById('wm');
    const wmLayer = document.getElementById('wm-layer');
    const tiledEl = document.getElementById('wm-tiled');

    const WM_POSITIONS = [
      { top: '8%',  left: '6%' },
      { top: '8%',  right: '6%' },
      { bottom: '12%', left: '6%' },
      { bottom: '12%', right: '6%' },
      { top: '42%', left: '30%' },
      { top: '30%', right: '18%' },
      { bottom: '28%', left: '20%' },
      { bottom: '40%', right: '28%' }
    ];

    let wmCfg = null;
    let wmPos = 0;
    let wmRoamTimer = null;
    let wmClockTimer = null;

    function wmClearTimers() {
      if (wmRoamTimer)  { clearInterval(wmRoamTimer);  wmRoamTimer = null; }
      if (wmClockTimer) { clearInterval(wmClockTimer); wmClockTimer = null; }
    }

    function wmBaseText() {
      let t = (wmCfg && wmCfg.text) ? String(wmCfg.text) : '';
      if (wmCfg && wmCfg.showTimestamp) {
        const d = new Date();
        const hh = ('0' + d.getHours()).slice(-2);
        const mm = ('0' + d.getMinutes()).slice(-2);
        t += '  ' + hh + ':' + mm;
      }
      return t;
    }

    function wmPlace(el, pos) {
      el.style.top = el.style.bottom = el.style.left = el.style.right = 'auto';
      if (pos.top    != null) el.style.top    = pos.top;
      if (pos.bottom != null) el.style.bottom = pos.bottom;
      if (pos.left   != null) el.style.left   = pos.left;
      if (pos.right  != null) el.style.right  = pos.right;
    }

    function wmRender() {
      wmClearTimers();
      wmLayer.style.display = 'none';
      tiledEl.style.display = 'none';
      if (!wmCfg || !wmCfg.text) return;

      const opacity = (typeof wmCfg.opacity === 'number') ? wmCfg.opacity : 0.12;
      const color   = wmCfg.color || '#ffffff';
      // TVs are viewed from a distance — scale the phone/web font up.
      const fontPx  = Math.round((wmCfg.fontSize || 16) * 1.6);
      const mode    = wmCfg.mode || 'roaming';

      if (mode === 'tiled') {
        tiledEl.style.display = 'flex';
        tiledEl.style.opacity = String(opacity * 0.8);
        tiledEl.innerHTML = '';
        const txt = wmBaseText();
        for (let i = 0; i < 12; i++) {
          const c = document.createElement('div');
          c.className = 'wm-cell';
          c.style.color = color;
          c.style.fontSize = Math.round(fontPx * 0.85) + 'px';
          c.style.margin = '2.5% 0';
          c.textContent = txt;
          tiledEl.appendChild(c);
        }
        if (wmCfg.showTimestamp) {
          wmClockTimer = setInterval(() => {
            const t = wmBaseText();
            tiledEl.querySelectorAll('.wm-cell').forEach((c) => { c.textContent = t; });
          }, 30000);
        }
        return;
      }

      wmLayer.style.display = 'block';
      wmEl.style.opacity  = String(opacity);
      wmEl.style.color    = color;
      wmEl.style.fontSize = fontPx + 'px';
      wmEl.textContent    = wmBaseText();

      if (mode === 'fixed') {
        wmPlace(wmEl, { top: '50%', left: '50%' });
        wmEl.style.transform = 'translate(-50%, -50%)';
      } else {
        wmEl.style.transform = 'none';
        wmPos = 0;
        wmPlace(wmEl, WM_POSITIONS[0]);
        const everyMs = (wmCfg.roamIntervalSec || 20) * 1000;
        wmRoamTimer = setInterval(() => {
          wmPos = (wmPos + 1) % WM_POSITIONS.length;
          wmPlace(wmEl, WM_POSITIONS[wmPos]);
        }, everyMs);
      }

      if (wmCfg.showTimestamp) {
        wmClockTimer = setInterval(() => { wmEl.textContent = wmBaseText(); }, 30000);
      }
    }

    function wmHide() {
      wmClearTimers();
      wmLayer.style.display = 'none';
      tiledEl.style.display = 'none';
    }

    // ── Player Events ──

    // Media loaded — hide splash, show overlay briefly, draw the fingerprint
    playerManager.addEventListener(
      cast.framework.events.EventType.PLAYER_LOAD_COMPLETE,
      (event) => {
        splash.classList.add('hidden');

        const media = playerManager.getMediaInformation();
        if (media && media.metadata) {
          mediaTitle.textContent = media.metadata.title || '';
          mediaSubtitle.textContent = media.metadata.subtitle || '';
        }
        showOverlay();
        wmRender();
      }
    );

    // Media ended — show splash again, drop the fingerprint
    playerManager.addEventListener(
      cast.framework.events.EventType.MEDIA_FINISHED,
      () => {
        splash.classList.remove('hidden');
        mediaTitle.textContent = '';
        mediaSubtitle.textContent = '';
        wmHide();
      }
    );

    // Playback started/resumed — flash overlay
    playerManager.addEventListener(
      cast.framework.events.EventType.PLAYING,
      () => showOverlay()
    );

    // Pause — show overlay persistently
    playerManager.addEventListener(
      cast.framework.events.EventType.PAUSE,
      () => {
        overlay.classList.add('visible');
        clearTimeout(overlayTimer);
      }
    );

    // Seek — flash overlay
    playerManager.addEventListener(
      cast.framework.events.EventType.SEEKED,
      () => showOverlay()
    );

    // ── Intercept LOAD request for custom handling ──
    playerManager.setMessageInterceptor(
      cast.framework.messages.MessageType.LOAD,
      (request) => {
        // Capture the forensic fingerprint shipped by the sender.
        try {
          const cd = request && request.media && request.media.customData;
          wmCfg = (cd && cd.watermark && cd.watermark.text) ? cd.watermark : null;
        } catch (e) { wmCfg = null; }

        // IMPORTANT: do NOT force hlsSegmentFormat here. The AUDIO container
        // differs per title (encoded = TS-wrapped, imported = raw ADTS) and the
        // sender already sets the correct value. Hard-coding TS — as the old
        // receiver did — re-broke imported titles (TS demux of raw AAC = no
        // audio/video). Leave the sender's value untouched.
        return request;
      }
    );

    // Sender may refresh the fingerprint mid-session (optional, safe no-op).
    context.addCustomMessageListener('urn:x-cast:com.streamnxt.watermark', (event) => {
      try {
        const d = event && event.data;
        wmCfg = (d && d.watermark && d.watermark.text) ? d.watermark
              : (d && d.text) ? d : null;
      } catch (e) {}
      wmRender();
    });

    // ── Error handling ──
    playerManager.addEventListener(
      cast.framework.events.EventType.ERROR,
      (event) => {
        console.error('[StreamNXT Receiver] Error:', event.detailedErrorCode, event);
      }
    );

    // ── Start the receiver ──
    context.start(options);
    console.log('[StreamNXT Receiver] Started');
  </script>
</body>
</html>
